<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SEA Video Album • Diagnostics Build</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1220;color:#e9eefc}
    .wrap{width:min(1500px,100%);margin:0 auto;padding:14px}

    /* diagnostics */
    #jsBadge{
      position:fixed; right:12px; bottom:12px; z-index:99999;
      font-size:12px; padding:8px 10px; border-radius:999px;
      background:rgba(34,197,94,.16); border:1px solid rgba(34,197,94,.35);
      box-shadow:0 10px 25px rgba(0,0,0,.35);
      user-select:none;
    }
    #errBox{
      position:fixed; left:12px; right:12px; top:12px; z-index:99999;
      display:none;
      padding:12px 12px;
      border-radius:14px;
      background:rgba(239,68,68,.14);
      border:1px solid rgba(239,68,68,.35);
      box-shadow:0 10px 25px rgba(0,0,0,.45);
      white-space:pre-wrap;
      font-size:12px;
      line-height:1.35;
    }

    /* ✅ Split layout with draggable divider */
    .split{
      display:flex;
      gap:0;
      align-items:stretch;
      min-height:0;
      --left: 78%;
    }
    .pane-left{flex:0 0 var(--left); min-width:50%;}
    .pane-right{flex:1 1 auto; min-width:0;}

    /* Divider */
    .divider{
      flex:0 0 14px;
      cursor:col-resize;
      position:relative;
      user-select:none;
      touch-action:none;
    }
    .divider::before{
      content:"";
      position:absolute; inset:10px 5px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 6px 18px rgba(0,0,0,.35);
    }
    .divider::after{
      content:"";
      position:absolute; left:50%; top:50%;
      width:3px; height:44px;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:rgba(255,255,255,.18);
      box-shadow:-6px 0 0 rgba(255,255,255,.12), 6px 0 0 rgba(255,255,255,.12);
      opacity:.85;
    }
    .divider:hover::before{background:rgba(255,255,255,.12)}
    .dragging .divider::before{background:rgba(255,255,255,.16)}
    .dragging{cursor:col-resize}

    @media(max-width:900px){
      .split{display:block}
      .divider{display:none}
      .pane-left,.pane-right{min-width:0;flex:auto}
    }

    .featured{
      border-radius:16px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .featuredTop{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(0,0,0,.18);
    }
    .featuredBadge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:.3px;
      background:rgba(0,0,0,.40);
      border:1px solid rgba(255,255,255,.12);
      white-space:nowrap;
    }

    .ratio16x9{
      position:relative;width:100%;
      padding-bottom:56.25%;
      height:0;overflow:hidden;
      background:rgba(255,255,255,.04);
    }
    .featuredStage{ position:absolute; inset:0; overflow:hidden; }

    .slide{ position:absolute; inset:0; will-change:transform; transform:translateX(0); background:rgba(0,0,0,.2); }
    .slide iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
    .anim{ transition:transform 520ms cubic-bezier(.2,.85,.2,1); }
    .fromRight{ transform:translateX(100%); }
    .toLeft{ transform:translateX(-100%); }

    .featuredMeta{
      padding:10px 12px;
      background:rgba(0,0,0,.24);
      border-top:1px solid rgba(255,255,255,.10);
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
    }
    .fText{min-width:0;flex:1 1 auto}
    .fTitle{font-weight:800;font-size:14px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 0 4px;}
    .fDesc{margin:0;font-size:12.5px;opacity:.9;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .fPills{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill{font-size:11px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);white-space:nowrap;opacity:.95;}

    .answerRow{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
    .miniInput{
      height:36px;max-width:360px;width:min(360px, 100%);
      border-radius:12px;border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.22);color:#e9eefc;padding:0 12px;outline:none;font-size:14px;
    }
    .miniInput::placeholder{color:rgba(233,238,252,.65)}
    .miniInput:disabled{opacity:.55; cursor:not-allowed}

    .sidebar{
      border-radius:16px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      overflow:hidden;
      display:flex;flex-direction:column;min-height:0;
    }
    .sideHeader{padding:12px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid rgba(255,255,255,.10);}
    .headerRow{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .hint{font-size:12px;opacity:.85}
    .sideControls{display:flex;gap:8px}
    .btn{
      appearance:none;border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.25);color:#e9eefc;
      padding:7px 10px;border-radius:10px;cursor:pointer;font-size:12px
    }
    .btn:hover{background:rgba(255,255,255,.08)}
    .btn:disabled{opacity:.55;cursor:not-allowed}

    .filters{display:flex;flex-direction:column;gap:10px}
    .searchWrap{display:flex;gap:10px;align-items:center}
    .search{
      width:100%;height:42px;border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.22);
      color:#e9eefc;padding:0 12px;outline:none;font-size:14px
    }
    .search::placeholder{color:rgba(233,238,252,.65)}
    .search:disabled{opacity:.55; cursor:not-allowed}
    .selectRow{display:flex;gap:10px;align-items:center}
    .select{
      width:100%;height:42px;border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.22);
      color:#e9eefc;
      padding:0 10px;
      outline:none;
      font-size:14px;
      appearance:none;
    }
    .select:disabled{opacity:.55; cursor:not-allowed}
    .count{
      font-size:12px;padding:7px 10px;border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.22);
      white-space:nowrap;opacity:.9
    }

    .list{flex:1 1 auto;min-height:0;overflow:auto;padding:12px;scroll-behavior:smooth;}

    .card{
      position:relative;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      margin-bottom:12px;
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
      display:flex;flex-direction:column;gap:10px;
    }
    .card:hover{transform:translateY(-2px);background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18)}

    .badge{
      display:flex;gap:8px;align-items:center;justify-content:space-between;
      font-size:11px;padding:6px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.35);
      max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .badgeLeft{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1 1 auto;}
    .badgeRight{flex:0 0 auto;opacity:.9;border-left:1px solid rgba(255,255,255,.18);padding-left:8px;margin-left:2px;}

    .thumb{border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);position:relative;}
    .thumbRatio{position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;background:rgba(255,255,255,.04);border-radius:12px;}
    .thumbImg{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);object-fit:cover;display:block;}
    .playDot{
      position:absolute;left:10px;bottom:10px;width:28px;height:28px;border-radius:999px;
      background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;font-size:12px;pointer-events:none;
    }

    .meta{display:flex;flex-direction:column;gap:6px;min-width:0;}
    .title{font-weight:800;font-size:14px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub{font-size:13px;opacity:.92;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

    .cardBtn{position:absolute;inset:0;border:0;background:transparent;cursor:pointer;border-radius:14px;}
    .cardBtn:focus{outline:2px solid rgba(255,255,255,.25);outline-offset:2px}
  </style>
</head>

<body>
  <div id="errBox"></div>
  <div id="jsBadge">JS: waiting…</div>

  <div class="wrap">
    <div class="split" id="split">

      <div class="pane-left">
        <section class="featured" id="featuredBox">
          <div class="featuredTop">
            <span class="featuredBadge">Featured</span>
          </div>

          <div class="ratio16x9">
            <div class="featuredStage" id="featuredStage"></div>
          </div>

          <div class="featuredMeta" aria-live="polite">
            <div class="fText">
              <p class="fTitle" id="fTitle">—</p>
              <p class="fDesc" id="fDesc">—</p>

              <div class="answerRow">
                <span class="pill" id="answerLabel">Answer</span>
                <input id="answerInput" class="miniInput" type="text" placeholder="Answer not added for this video yet" disabled />
                <button class="btn" id="checkAnswerBtn" type="button" disabled>Check</button>
                <button class="btn" id="revealAnswerBtn" type="button" style="display:none;">Reveal</button>
                <span class="hint" id="answerMsg"></span>
              </div>
            </div>

            <div class="fPills">
              <span class="pill" id="fStrand">Strand</span>
              <span class="pill" id="fObjGroup">Objective Group</span>
              <span class="pill" id="fProcess">Process</span>
            </div>
          </div>
        </section>
      </div>

      <div class="divider" id="divider" role="separator" aria-orientation="vertical"
           aria-label="Resize featured video and sidebar" tabindex="0"></div>

      <div class="pane-right">
        <aside class="sidebar" id="sidebar">
          <div class="sideHeader">
            <div class="headerRow">
              <div class="hint">SEA Math Video Album</div>
              <div class="sideControls">
                <button class="btn" id="resetFilters" type="button">Reset</button>
                <button class="btn" id="scrollUp" type="button">▲</button>
                <button class="btn" id="scrollDown" type="button">▼</button>
              </div>
            </div>

            <div class="filters">
              <div class="searchWrap">
                <input class="search" id="searchInput" type="text"
                       placeholder="SEA keyword search (objective language / tags / title / desc)..." />
                <div class="count" id="countLabel">0</div>
              </div>

              <div class="selectRow">
                <select class="select" id="strandSelect">
                  <option value="all">All SEA Strands</option>
                </select>
              </div>

              <div class="selectRow" id="objRow" style="display:none;">
                <select class="select" id="objSelect">
                  <option value="all">All Objective Groups</option>
                </select>
              </div>

              <div class="selectRow">
                <select class="select" id="processSelect">
                  <option value="all">All Thinking Processes</option>
                  <option value="Knowing">Knowing</option>
                  <option value="Applying">Applying</option>
                  <option value="Reasoning">Reasoning</option>
                </select>
              </div>
            </div>
          </div>

          <div class="list" id="videoList"></div>
        </aside>
      </div>

    </div>
  </div>

  <script>
  (function(){
    const errBox = document.getElementById("errBox");
    const jsBadge = document.getElementById("jsBadge");

    function showErr(msg){
      errBox.style.display = "block";
      errBox.textContent = msg;
      jsBadge.textContent = "JS: ERROR";
      jsBadge.style.background = "rgba(239,68,68,.16)";
      jsBadge.style.borderColor = "rgba(239,68,68,.35)";
    }

    window.addEventListener("error", (e) => {
      showErr("Script error:\n" + (e.message || "Unknown") + "\n\nFile: " + (e.filename || "?") + "\nLine: " + (e.lineno || "?"));
    });
    window.addEventListener("unhandledrejection", (e) => {
      showErr("Promise rejection:\n" + (e.reason ? (e.reason.stack || e.reason) : "Unknown"));
    });

    try{
      jsBadge.textContent = "JS: running…";

      const VALID_STRANDS = ["Number","Geometry","Measurement","Statistics"];
      const VALID_PROCESSES = ["Knowing","Applying","Reasoning"];

      const SEA_TAXONOMY = {
        "Number": { objGroups: { "Problem Solving": ["bar model","comparison","guess and check","working backwards"] } },
        "Measurement": {
          objGroups: {
            "Linear Measure":["length","linear measurement","cm","m","mm","km","measure","convert units"],
            "Money":["money","dollars","vat","tax"]
          }
        },
        "Geometry": { objGroups: {} },
        "Statistics": { objGroups: { "Mode & Mean":["mean","average","mode"] } }
      };

      // ✅ Minimum dataset (includes your VAT + Ribbon so you can confirm it works)
      let videos = [
        {"title":"VAT Inclusive Price → Original Price (12.5% Tax)","desc":"Reverse VAT: $720 is VAT inclusive. 12.5% = 1/8.","topic":"Measurement","subtopic":"Money","keywords":["VAT","12.5%","1/8","inclusive price","exclusive price"],"src":"https://app.screencast.com/0XKGa9Fux4RyT/e","answerKeys":["640","$640","640.00","$640.00"],"answerHint":"Original price before VAT","strand":"Measurement","objGroup":"Money","process":"Reasoning"},
        {"title":"Ribbon Problem: 8.4 m, Use 1/4, Cut into 70 cm Bows","desc":"Convert meters to centimeters, subtract 1/4 used, then divide by 70 cm.","topic":"Measurement","subtopic":"Linear Measure","keywords":["ribbon","bows","meters to centimeters","convert units","1/4","70 cm"],"src":"https://app.screencast.com/0pgNqTPQ1S6sd/e","answerKeys":["9","9 bows","nine","nine bows"],"answerHint":"How many bows were made?","strand":"Measurement","objGroup":"Linear Measure","process":"Reasoning"},
      ];

      function seaTermsFor(v){
        const s = SEA_TAXONOMY[v.strand];
        if (!s || !s.objGroups) return [];
        return (s.objGroups[v.objGroup] || []).slice();
      }
      function autoKeywords(v){
        const raw = [
          v.title, v.desc, v.strand, v.objGroup, v.process,
          v.topic, v.subtopic,
          ...(Array.isArray(v.keywords) ? v.keywords : []),
          ...(Array.isArray(v.answerKeys) ? v.answerKeys : []),
          v.answerHint
        ].filter(Boolean).join(" ");

        return Array.from(new Set(
          raw.toLowerCase()
            .replace(/[^a-z0-9\s&()%$=.,-]/g," ")
            .split(/\s+/)
            .filter(w => w.length >= 2)
        ));
      }
      function normalizeVideo(v){
        const out = { ...v };

        if (out.src) {
          out.src = String(out.src).trim();
          if (!out.src.endsWith("/e")) out.src = out.src.replace(/\/?$/,"/e");
        }
        if (!out.strand || !VALID_STRANDS.includes(out.strand)) out.strand = "Number";
        if (!out.process || !VALID_PROCESSES.includes(out.process)) out.process = "Applying";
        out.keywords = Array.isArray(out.keywords) ? out.keywords : [];

        out._sea = seaTermsFor(out);
        out._auto = autoKeywords(out);
        return out;
      }
      videos = videos.map(normalizeVideo);

      const STRAND_COLORS = {
        "Number":      { bg:"rgba(59,130,246,.18)",  border:"rgba(59,130,246,.35)" },
        "Measurement": { bg:"rgba(34,197,94,.18)",   border:"rgba(34,197,94,.35)" },
        "Geometry":    { bg:"rgba(168,85,247,.18)",  border:"rgba(168,85,247,.35)" },
        "Statistics":  { bg:"rgba(251,146,60,.18)",  border:"rgba(251,146,60,.35)" }
      };
      function applyStrandColor(el, strand){
        const c = STRAND_COLORS[strand];
        if (!c) return;
        el.style.background = c.bg;
        el.style.borderColor = c.border;
      }

      // DOM
      const split         = document.getElementById("split");
      const divider       = document.getElementById("divider");
      const featuredBox   = document.getElementById("featuredBox");
      const stage         = document.getElementById("featuredStage");
      const listEl        = document.getElementById("videoList");
      const searchInput   = document.getElementById("searchInput");
      const countLabel    = document.getElementById("countLabel");
      const sidebar       = document.getElementById("sidebar");

      const strandSelect  = document.getElementById("strandSelect");
      const objSelect     = document.getElementById("objSelect");
      const objRow        = document.getElementById("objRow");
      const processSelect = document.getElementById("processSelect");

      const fTitle    = document.getElementById("fTitle");
      const fDesc     = document.getElementById("fDesc");
      const fStrand   = document.getElementById("fStrand");
      const fObjGroup = document.getElementById("fObjGroup");
      const fProcess  = document.getElementById("fProcess");

      const answerLabel = document.getElementById("answerLabel");
      const answerInput = document.getElementById("answerInput");
      const checkAnswerBtn = document.getElementById("checkAnswerBtn");
      const revealAnswerBtn = document.getElementById("revealAnswerBtn");
      const answerMsg = document.getElementById("answerMsg");

      const norm = s => (s || "").toLowerCase().trim();

      function makeIframe(src){
        const iframe = document.createElement("iframe");
        iframe.src = src;
        iframe.setAttribute("scrolling","no");
        iframe.setAttribute("frameborder","0");
        iframe.setAttribute("allowfullscreen","true");
        return iframe;
      }
      function makeSlide(src, extraClass=""){
        const slide = document.createElement("div");
        slide.className = `slide ${extraClass}`.trim();
        slide.appendChild(makeIframe(src));
        return slide;
      }

      let featuredIdx = 0;
      let isAnimating = false;

      function normalizeForCompare(s){
        return (s || "")
          .toLowerCase()
          .replace(/\$/g,"")
          .replace(/,/g," ")
          .replace(/\band\b/g," ")
          .replace(/[:=]/g," ")
          .replace(/\b(dollars?|ttd)\b/g,"")
          .replace(/\s+/g," ")
          .trim();
      }
      function getAnswerVariants(v){
        if (!v || !Array.isArray(v.answerKeys) || v.answerKeys.length === 0) return null;
        const raw = v.answerKeys.map(x => String(x));
        const normed = raw.map(x => normalizeForCompare(x));
        return { raw, norm: normed };
      }
      function setAnswerUI(){
        const v = videos[featuredIdx];
        const variants = getAnswerVariants(v);

        answerLabel.textContent = v.answerHint ? `Answer • ${v.answerHint}` : "Answer";
        answerMsg.textContent = "";
        revealAnswerBtn.style.display = "none";
        answerInput.value = "";

        if (!variants){
          answerInput.disabled = true;
          checkAnswerBtn.disabled = true;
          answerInput.placeholder = "Answer not added for this video yet";
          return;
        }
        answerInput.disabled = false;
        checkAnswerBtn.disabled = false;
        answerInput.placeholder = "Type your answer…";
      }

      checkAnswerBtn.addEventListener("click", () => {
        const v = videos[featuredIdx];
        const variants = getAnswerVariants(v);
        if (!variants) return;

        const user = normalizeForCompare(answerInput.value);
        if (!user){
          answerMsg.textContent = "Type an answer first.";
          revealAnswerBtn.style.display = "none";
          return;
        }
        const ok = variants.norm.some(k => k === user);
        if (ok){
          answerMsg.textContent = "✅ Correct!";
          revealAnswerBtn.style.display = "none";
        } else {
          answerMsg.textContent = "❌ Not quite. Click Reveal.";
          revealAnswerBtn.style.display = "";
        }
      });

      revealAnswerBtn.addEventListener("click", () => {
        const v = videos[featuredIdx];
        if (!v.answerKeys || !v.answerKeys.length) return;
        answerMsg.textContent = `✅ Answer: ${v.answerKeys[0]}`;
        revealAnswerBtn.style.display = "none";
      });

      function updateFeaturedMeta(){
        const v = videos[featuredIdx];
        fTitle.textContent = v.title || "—";
        fDesc.textContent  = v.desc  || "—";
        fStrand.textContent = v.strand || "Strand";
        fObjGroup.textContent = v.objGroup || "Objective Group";
        fProcess.textContent = v.process || "Process";
        fStrand.style.background = "rgba(255,255,255,.06)";
        fStrand.style.borderColor = "rgba(255,255,255,.14)";
        applyStrandColor(fStrand, v.strand);
        setAnswerUI();
      }

      function setFeaturedInstant(idx){
        featuredIdx = idx;
        stage.innerHTML = "";
        stage.appendChild(makeSlide(videos[featuredIdx].src));
        updateFeaturedMeta();
      }

      function pushSwapToFeatured(clickedIdx){
        if (isAnimating || clickedIdx === featuredIdx) return;

        const oldSrc = videos[featuredIdx].src;
        const newSrc = videos[clickedIdx].src;

        const temp = videos[featuredIdx];
        videos[featuredIdx] = videos[clickedIdx];
        videos[clickedIdx] = temp;

        isAnimating = true;
        const duration = matchMedia("(prefers-reduced-motion: reduce)").matches ? 0 : 520;

        stage.innerHTML = "";
        const oldSlide = makeSlide(oldSrc, "anim");
        const newSlide = makeSlide(newSrc, "fromRight");
        stage.appendChild(oldSlide);
        stage.appendChild(newSlide);

        void newSlide.offsetWidth;

        newSlide.classList.add("anim");
        oldSlide.classList.add("toLeft");
        newSlide.classList.remove("fromRight");

        setTimeout(() => {
          stage.innerHTML = "";
          stage.appendChild(makeSlide(videos[featuredIdx].src));
          isAnimating = false;
          updateFeaturedMeta();
          buildStrandOptions();
          buildObjOptions();
          buildList();
          syncSidebarHeight();
        }, duration + 30);
      }

      function thumbUrlFor(video){
        if (video.thumb) return video.thumb;
        const text = encodeURIComponent(video.title || "Video");
        return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
          <svg xmlns='http://www.w3.org/2000/svg' width='640' height='360'>
            <defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'>
              <stop offset='0' stop-color='#162a55'/><stop offset='1' stop-color='#0b1220'/>
            </linearGradient></defs>
            <rect width='100%' height='100%' fill='url(#g)'/>
            <circle cx='320' cy='180' r='46' fill='rgba(255,255,255,0.12)'/>
            <polygon points='308,155 308,205 352,180' fill='rgba(255,255,255,0.75)'/>
            <text x='32' y='324' fill='rgba(255,255,255,0.85)' font-family='Arial' font-size='26'>${text}</text>
          </svg>
        `);
      }

      function getAllStrands(){
        const set = new Set();
        videos.forEach(v => { if (v.strand) set.add(v.strand); });
        const order = ["Number","Measurement","Geometry","Statistics"];
        return Array.from(set).sort((a,b) => order.indexOf(a) - order.indexOf(b));
      }

      function buildStrandOptions(){
        const current = strandSelect.value || "all";
        const strands = getAllStrands();
        strandSelect.innerHTML = "";
        strandSelect.appendChild(new Option("All SEA Strands", "all"));
        strands.forEach(s => strandSelect.appendChild(new Option(s, s)));
        strandSelect.value = strands.includes(current) ? current : "all";
      }

      function getObjGroupsForStrand(strand){
        const set = new Set();
        videos.forEach(v => {
          if (!v.objGroup) return;
          if (strand === "all" || v.strand === strand) set.add(v.objGroup);
        });
        return Array.from(set).sort();
      }

      function buildObjOptions(){
        const strand = strandSelect.value || "all";
        const current = objSelect.value || "all";
        if (strand === "all"){
          objRow.style.display = "none";
          objSelect.innerHTML = "";
          objSelect.appendChild(new Option("All Objective Groups", "all"));
          objSelect.value = "all";
          return;
        }
        objRow.style.display = "";
        const groups = getObjGroupsForStrand(strand);
        objSelect.innerHTML = "";
        objSelect.appendChild(new Option("All Objective Groups", "all"));
        groups.forEach(g => objSelect.appendChild(new Option(g, g)));
        objSelect.value = groups.includes(current) ? current : "all";
      }

      const DEFAULT_SEARCH_PH = "SEA keyword search (objective language / tags / title / desc)…";
      function enforceEitherOr(source){
        const hasKeyword = norm(searchInput.value).length > 0;
        const hasStrand = (strandSelect.value && strandSelect.value !== "all");
        const hasObj = (objSelect.value && objSelect.value !== "all");
        const hasProc = (processSelect.value && processSelect.value !== "all");
        const hasDropdownFilter = hasStrand || hasObj || hasProc;

        if (source === "dropdown") {
          if (hasDropdownFilter) {
            searchInput.value = "";
            searchInput.disabled = true;
            searchInput.placeholder = "Keyword search disabled while filters are active";
          } else {
            searchInput.disabled = false;
            searchInput.placeholder = DEFAULT_SEARCH_PH;
          }
        }

        if (source === "keyword") {
          const nowHasKeyword = norm(searchInput.value).length > 0;
          if (nowHasKeyword) {
            strandSelect.value = "all";
            objSelect.value = "all";
            processSelect.value = "all";
            strandSelect.disabled = true;
            objSelect.disabled = true;
            processSelect.disabled = true;
            objRow.style.display = "none";
          } else {
            strandSelect.disabled = false;
            objSelect.disabled = false;
            processSelect.disabled = false;
          }
        }

        if (!hasKeyword && !hasDropdownFilter) {
          searchInput.disabled = false;
          searchInput.placeholder = DEFAULT_SEARCH_PH;
          strandSelect.disabled = false;
          objSelect.disabled = false;
          processSelect.disabled = false;
        }
      }

      function passesFilters(v){
        const q = norm(searchInput.value);
        const strand = strandSelect.value;
        const obj = objSelect.value;
        const proc = processSelect.value;

        const matchesStrand = (strand === "all") || (v.strand === strand);
        const matchesObj   = (obj === "all") || (v.objGroup === obj);
        const matchesProc  = (proc === "all") || (v.process === proc);

        const hay = norm(
          (v.title || "") + " " +
          (v.desc || "") + " " +
          (v.strand || "") + " " +
          (v.objGroup || "") + " " +
          (v.process || "") + " " +
          ((v.keywords || []).join(" ")) + " " +
          ((v._auto || []).join(" "))
        );
        const matchesText = !q || hay.includes(q);

        return matchesStrand && matchesObj && matchesProc && matchesText;
      }

      function buildList(){
        listEl.innerHTML = "";
        const visibleIdxs = [];
        videos.forEach((v, idx) => { if (passesFilters(v)) visibleIdxs.push(idx); });

        countLabel.textContent = String(visibleIdxs.length);

        visibleIdxs.forEach((idx) => {
          const v = videos[idx];

          const card = document.createElement("div");
          card.className = "card";

          const badge = document.createElement("div");
          badge.className = "badge";
          applyStrandColor(badge, v.strand);

          const left = document.createElement("div");
          left.className = "badgeLeft";
          left.textContent = `${v.strand} • ${v.objGroup}`;

          const right = document.createElement("div");
          right.className = "badgeRight";
          right.textContent = v.process;

          badge.appendChild(left);
          badge.appendChild(right);

          const thumb = document.createElement("div");
          thumb.className = "thumb";

          const thumbRatio = document.createElement("div");
          thumbRatio.className = "thumbRatio";

          const img = document.createElement("img");
          img.className = "thumbImg";
          img.alt = v.title || "Video thumbnail";
          img.src = thumbUrlFor(v);

          const dot = document.createElement("div");
          dot.className = "playDot";
          dot.textContent = "▶";

          thumbRatio.appendChild(img);
          thumbRatio.appendChild(dot);
          thumb.appendChild(thumbRatio);

          const meta = document.createElement("div");
          meta.className = "meta";

          const t = document.createElement("div");
          t.className = "title";
          t.textContent = v.title || "Untitled video";

          const d = document.createElement("div");
          d.className = "sub";
          d.textContent = v.desc || "";

          meta.appendChild(t);
          meta.appendChild(d);

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "cardBtn";
          btn.addEventListener("click", () => pushSwapToFeatured(idx));

          card.appendChild(badge);
          card.appendChild(thumb);
          card.appendChild(meta);
          card.appendChild(btn);

          listEl.appendChild(card);
        });

        syncSidebarHeight();
      }

      searchInput.addEventListener("input", () => { enforceEitherOr("keyword"); buildList(); });
      strandSelect.addEventListener("change", () => { buildObjOptions(); enforceEitherOr("dropdown"); buildList(); });
      objSelect.addEventListener("change", () => { enforceEitherOr("dropdown"); buildList(); });
      processSelect.addEventListener("change", () => { enforceEitherOr("dropdown"); buildList(); });

      document.getElementById("resetFilters").addEventListener("click", () => {
        searchInput.value = "";
        searchInput.disabled = false;
        searchInput.placeholder = DEFAULT_SEARCH_PH;
        strandSelect.disabled = false;
        objSelect.disabled = false;
        processSelect.disabled = false;
        strandSelect.value = "all";
        objSelect.value = "all";
        processSelect.value = "all";
        objRow.style.display = "none";
        buildStrandOptions();
        buildObjOptions();
        buildList();
      });

      function syncSidebarHeight(){
        if (window.matchMedia("(max-width:900px)").matches) {
          sidebar.style.height = "auto";
          return;
        }
        const h = featuredBox.getBoundingClientRect().height;
        if (h > 0) sidebar.style.height = h + "px";
      }
      window.addEventListener("resize", syncSidebarHeight);

      document.getElementById("scrollUp").addEventListener("click", () => listEl.scrollBy({ top:-260, behavior:"smooth" }));
      document.getElementById("scrollDown").addEventListener("click", () => listEl.scrollBy({ top: 260, behavior:"smooth" }));

      // divider
      const MIN_LEFT_RATIO = 0.50;
      const MAX_LEFT_RATIO = 0.88;
      function setLeftRatio(r){
        const clamped = Math.max(MIN_LEFT_RATIO, Math.min(MAX_LEFT_RATIO, r));
        split.style.setProperty("--left", (clamped * 100).toFixed(2) + "%");
        requestAnimationFrame(syncSidebarHeight);
      }
      function isDesktop(){ return !window.matchMedia("(max-width:900px)").matches; }
      function pointerToRatio(clientX){
        const rect = split.getBoundingClientRect();
        return (clientX - rect.left) / rect.width;
      }
      let dragging = false;
      divider.addEventListener("pointerdown", (e)=>{ if(!isDesktop()) return; dragging=true; document.body.classList.add("dragging"); divider.setPointerCapture?.(e.pointerId); });
      divider.addEventListener("pointermove", (e)=>{ if(!dragging || !isDesktop()) return; setLeftRatio(pointerToRatio(e.clientX)); });
      function endDrag(){ if(!dragging) return; dragging=false; document.body.classList.remove("dragging"); }
      divider.addEventListener("pointerup", endDrag);
      divider.addEventListener("pointercancel", endDrag);

      // init
      buildStrandOptions();
      buildObjOptions();
      setFeaturedInstant(0);
      enforceEitherOr("dropdown");
      buildList();
      requestAnimationFrame(syncSidebarHeight);

      jsBadge.textContent = "JS: OK ✓ (" + videos.length + " videos)";
    } catch (err){
      showErr("Caught error:\n" + (err && (err.stack || err.message) ? (err.stack || err.message) : String(err)));
    }
  })();
  </script>
</body>
</html>

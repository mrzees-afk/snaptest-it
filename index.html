<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SEA Video Album • With Answer Checker</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1220;color:#e9eefc}
    .wrap{width:min(1500px,100%);margin:0 auto;padding:14px}

    /* ✅ Split layout with draggable divider */
    .split{
      display:flex;
      gap:0;
      align-items:stretch;
      min-height:0;
      --left: 78%; /* default featured width */
    }
    .pane-left{flex:0 0 var(--left); min-width:50%;}
    .pane-right{flex:1 1 auto; min-width:0;}

    /* Divider */
    .divider{
      flex:0 0 14px;
      cursor:col-resize;
      position:relative;
      user-select:none;
      touch-action:none;
    }
    .divider::before{
      content:"";
      position:absolute; inset:10px 5px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 6px 18px rgba(0,0,0,.35);
    }
    .divider::after{
      content:"";
      position:absolute; left:50%; top:50%;
      width:3px; height:44px;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:rgba(255,255,255,.18);
      box-shadow:
        -6px 0 0 rgba(255,255,255,.12),
         6px 0 0 rgba(255,255,255,.12);
      opacity:.85;
    }
    .divider:hover::before{background:rgba(255,255,255,.12)}
    .dragging .divider::before{background:rgba(255,255,255,.16)}
    .dragging{cursor:col-resize}

    /* Stack on mobile */
    @media(max-width:900px){
      .split{display:block}
      .divider{display:none}
      .pane-left,.pane-right{min-width:0;flex:auto}
    }

    /* ✅ Featured */
    .featured{
      border-radius:16px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* Permanent space ABOVE the video */
    .featuredTop{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:rgba(0,0,0,.18);
    }
    .featuredBadge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:.3px;
      background:rgba(0,0,0,.40);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(8px);
      white-space:nowrap;
    }

    /* Featured height anchor (16:9) */
    .ratio16x9{
      position:relative;width:100%;
      padding-bottom:56.25%;
      height:0;overflow:hidden;
      background:rgba(255,255,255,.04);
    }
    .featuredStage{ position:absolute; inset:0; overflow:hidden; }

    /* Sliding frames */
    .slide{
      position:absolute; inset:0;
      will-change:transform;
      transform:translateX(0);
      background:rgba(0,0,0,.2);
    }
    .slide iframe{
      position:absolute; inset:0;
      width:100%; height:100%;
      border:0;
    }
    .anim{ transition:transform 520ms cubic-bezier(.2,.85,.2,1); }
    .fromRight{ transform:translateX(100%); }
    .toLeft{ transform:translateX(-100%); }

    /* ✅ Meta bar UNDER the video (no overlap) */
    .featuredMeta{
      padding:10px 12px;
      background:rgba(0,0,0,.24);
      border-top:1px solid rgba(255,255,255,.10);
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
      flex:0 0 auto;
    }
    .fText{min-width:0;flex:1 1 auto}
    .fTitle{
      font-weight:800;
      font-size:14px;
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin:0 0 4px;
    }
    .fDesc{
      margin:0;
      font-size:12.5px;
      opacity:.9;
      line-height:1.35;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .fPills{display:flex;gap:8px;flex:0 0 auto}
    .pill{
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      white-space:nowrap;
      opacity:.95;
    }

    /* ✅ Answer checker */
    .answerRow{
      margin-top:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .miniInput{
      height:36px;
      max-width:360px;
      width:min(360px, 100%);
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.22);
      color:#e9eefc;
      padding:0 12px;
      outline:none;
      font-size:14px;
    }
    .miniInput::placeholder{color:rgba(233,238,252,.65)}
    .miniInput:disabled{opacity:.55; cursor:not-allowed}

    /* Sidebar */
    .sidebar{
      border-radius:16px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .sideHeader{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      border-bottom:1px solid rgba(255,255,255,.10);
      flex:0 0 auto;
    }
    .headerRow{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .hint{font-size:12px;opacity:.85}
    .sideControls{display:flex;gap:8px}
    .btn{
      appearance:none;border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.25);color:#e9eefc;
      padding:7px 10px;border-radius:10px;cursor:pointer;font-size:12px
    }
    .btn:hover{background:rgba(255,255,255,.08)}
    .btn:disabled{opacity:.55;cursor:not-allowed}

    /* Filters */
    .filters{display:flex;flex-direction:column;gap:10px}
    .searchWrap{display:flex;gap:10px;align-items:center}
    .search{
      width:100%;height:42px;border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.22);
      color:#e9eefc;padding:0 12px;outline:none;font-size:14px
    }
    .search::placeholder{color:rgba(233,238,252,.65)}
    .search:disabled{opacity:.55; cursor:not-allowed}
    .selectRow{display:flex;gap:10px;align-items:center}
    .select{
      width:100%;
      height:42px;border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.22);
      color:#e9eefc;
      padding:0 10px;
      outline:none;
      font-size:14px;
      appearance:none;
    }
    .select:disabled{opacity:.55; cursor:not-allowed}
    .count{
      font-size:12px;padding:7px 10px;border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.22);
      white-space:nowrap;opacity:.9
    }

    /* List */
    .list{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding:12px;
      scroll-behavior:smooth;
    }

    /* ✅ Cards */
    .card{
      position:relative;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      margin-bottom:12px;
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .card:hover{transform:translateY(-2px);background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18)}

    .badge{
      position:static;
      display:inline-flex;
      align-self:flex-start;
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(6px);
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .thumb{
      border-radius:12px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      position:relative;
      transform: translateZ(0);
      -webkit-mask-image: -webkit-radial-gradient(white, black);
    }
    .thumbRatio{
      position:relative;
      width:100%;
      padding-bottom:56.25%;
      height:0;
      overflow:hidden;
      background:rgba(255,255,255,.04);
      border-radius:12px;
    }
    .thumbImg{
      position:absolute;
      inset:-1px;
      width:calc(100% + 2px);
      height:calc(100% + 2px);
      object-fit:cover;
      object-position:center;
      display:block;
      filter:saturate(1.05) contrast(1.03);
      transform: translateZ(0);
      will-change: transform;
    }
    .playDot{
      position:absolute;
      left:10px; bottom:10px;
      width:28px; height:28px;
      border-radius:999px;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(6px);
      font-size:12px;
      pointer-events:none;
    }

    .meta{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
      padding-top:0;
    }
    .title{
      font-weight:800;
      font-size:14px;
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis
    }
    .sub{
      font-size:13px;
      opacity:.92;
      line-height:1.4;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .cardBtn{
      position:absolute;inset:0;border:0;background:transparent;
      cursor:pointer;border-radius:14px;
    }
    .cardBtn:focus{outline:2px solid rgba(255,255,255,.25);outline-offset:2px}

    @media(max-width:900px){
      .sidebar{height:auto!important}
      .sub{-webkit-line-clamp:5}
    }

    @media (prefers-reduced-motion: reduce){
      .anim{transition:none!important}
      .card{transition:none!important}
      .list{scroll-behavior:auto}
    }
  </style>
</head>

        </aside>
      </div>

    </div>

    // ✅ Auto-keywords
    function autoKeywords(v){
      const raw = [
        v.title, v.desc, v.topic, v.subtopic,
        ...(Array.isArray(v.keywords) ? v.keywords : []),
        ...(Array.isArray(v.answerKeys) ? v.answerKeys : []),
        v.answerHint, v.answer, v.answerKey
      ].filter(Boolean).join(" ");

      return Array.from(new Set(
        raw
          .toLowerCase()
          .replace(/[^a-z0-9\s&()%$=.,-]/g," ")
          .split(/\s+/)
          .filter(w => w.length >= 2)
      ));
    }

    function normalizeVideo(v){
      const out = { ...v };

      // Force /e at end of Screencast src
      if (out.src) {
        out.src = String(out.src).trim();
        if (!out.src.endsWith("/e")) out.src = out.src.replace(/\/?$/,"/e");
      }

      // Fix "Money" accidentally used as topic
      if ((out.topic || "").trim().toLowerCase() === "money"){
        out.topic = "Measurement";
        out.subtopic = out.subtopic || "Money";
      }

      // Force valid topic
      if (!VALID_TOPICS.includes(out.topic)){
        const text = ((out.title||"") + " " + (out.desc||"") + " " + (out.subtopic||"")).toLowerCase();
        if (text.includes("time") || text.includes("perimeter") || text.includes("area") || text.includes("length") || text.includes("money") || text.includes("vat")){
          out.topic = "Measurement";
        } else if (text.includes("graph") || text.includes("mean") || text.includes("average") || text.includes("statistics")){
          out.topic = "Data Handling";
        } else {
          out.topic = "Number";
        }
      }

      if ((out.subtopic || "").trim().toLowerCase() === "length"){
        out.subtopic = "Length & Perimeter";
      }
      if (!out.subtopic) out.subtopic = "General";

      // Keywords
      out.keywords = Array.isArray(out.keywords) ? out.keywords : (out.keywords ? [String(out.keywords)] : []);

      // ✅ Answers: accept multiple styles and normalize to answerKeys array
      let keys = null;
      if (Array.isArray(out.answerKeys)) keys = out.answerKeys;
      else if (typeof out.answerKeys === "string" && out.answerKeys.trim()) keys = [out.answerKeys.trim()];
      else if (typeof out.answer === "string" && out.answer.trim()) keys = [out.answer.trim()];
      else if (typeof out.answerKey === "string" && out.answerKey.trim()) keys = [out.answerKey.trim()];

      out.answerKeys = keys ? keys.map(x => String(x).trim()).filter(Boolean) : null;

      out._auto = autoKeywords(out);
      return out;
    }

    /* ✅ Answer compare (forgiving) */
    function normalizeForCompare(s){
      return (s || "")
        .toLowerCase()
        .replace(/\$/g,"")
        .replace(/,/g," ")
        .replace(/\band\b/g," ")
        .replace(/[:=]/g," ")
        .replace(/\b(dollars?|ttd)\b/g,"")
        .replace(/\b(meters?|metres?|m)\b/g,"")
        .replace(/\s+/g," ")
        .trim();
    }

    function getAnswerVariants(v){
      if (!v || !Array.isArray(v.answerKeys) || v.answerKeys.length === 0) return null;
      const raw = v.answerKeys.map(x => String(x));
      const normed = raw.map(x => normalizeForCompare(x));
      return { raw, norm: normed };
    }

    function setAnswerUI(){
      const v = videos[featuredIdx];
      const variants = getAnswerVariants(v);

      answerLabel.textContent = v.answerHint ? `Answer • ${v.answerHint}` : "Answer";
      answerMsg.textContent = "";
      revealAnswerBtn.style.display = "none";
      answerInput.value = "";

      if (!variants){
        answerInput.disabled = true;
        checkAnswerBtn.disabled = true;
        answerInput.placeholder = "Answer not added for this video yet";
        return;
      }

      answerInput.disabled = false;
      checkAnswerBtn.disabled = false;
      answerInput.placeholder = "Type your answer (any reasonable format)...";
    }

    checkAnswerBtn.addEventListener("click", () => {
      const v = videos[featuredIdx];
      const variants = getAnswerVariants(v);
      if (!variants) return;

      const user = normalizeForCompare(answerInput.value);
      if (!user){
        answerMsg.textContent = "Type an answer first.";
        revealAnswerBtn.style.display = "none";
        return;
      }

      const ok = variants.norm.some(k => k === user);

      if (ok){
        answerMsg.textContent = "✅ Correct!";
        revealAnswerBtn.style.display = "none";
      } else {
        answerMsg.textContent = "❌ Not quite. Watch the video (or click Reveal).";

    function setFeaturedInstant(idx){
      featuredIdx = idx;
      stage.innerHTML = "";
      stage.appendChild(makeSlide(videos[featuredIdx].src));

    function pushSwapToFeatured(clickedIdx){
      if (isAnimating || clickedIdx === featuredIdx) return;

      const oldSrc = videos[featuredIdx].src;
      const newSrc = videos[clickedIdx].src;

      const temp = videos[featuredIdx];
      videos[featuredIdx] = videos[clickedIdx];
      videos[clickedIdx] = temp;

      isAnimating = true;
      const duration = matchMedia("(prefers-reduced-motion: reduce)").matches ? 0 : 520;

      stage.innerHTML = "";
      const oldSlide = makeSlide(oldSrc, "anim");
      const newSlide = makeSlide(newSrc, "fromRight");
      stage.appendChild(oldSlide);
      stage.appendChild(newSlide);

      void newSlide.offsetWidth;

      newSlide.classList.add("anim");
      oldSlide.classList.add("toLeft");
      newSlide.classList.remove("fromRight");

      setTimeout(() => {
        stage.innerHTML = "";
        stage.appendChild(makeSlide(videos[featuredIdx].src));
        isAnimating = false;
        updateFeaturedMeta();
        buildTopicOptions();
        buildSubtopicOptions();
        buildList();
        syncSidebarHeight();
      }, duration + 30);
    }

    function getAllTopics(){
      const set = new Set();
      videos.forEach(v => { if (v.topic) set.add(v.topic); });
      const order = ["Number","Measurement","Geometry","Data Handling"];
      return Array.from(set).sort((a,b) => order.indexOf(a) - order.indexOf(b));
    }

    function buildTopicOptions(){
      const current = topicSelect.value || "all";
      const topics = getAllTopics();

      topicSelect.innerHTML = "";
      const optAll = document.createElement("option");
      optAll.value = "all";
      optAll.textContent = "All SEA Topics";
      topicSelect.appendChild(optAll);

      topics.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        topicSelect.appendChild(opt);
      });

      topicSelect.value = topics.includes(current) ? current : "all";
    }

    function getSubtopicsForTopic(topic){
      const set = new Set();
      videos.forEach(v => {
        if (!v.subtopic) return;
        if (topic === "all" || (v.topic || "") === topic) set.add(v.subtopic);
      });
      return Array.from(set).sort();
    }

    function buildSubtopicOptions(){
      const topic = topicSelect.value || "all";
      const current = subtopicSelect.value || "all";

      if (topic === "all") {
        subtopicRow.style.display = "none";
        subtopicSelect.innerHTML = `<option value="all">All Subtopics</option>`;
        subtopicSelect.value = "all";
        return;
      }

      subtopicRow.style.display = "";
      const subs = getSubtopicsForTopic(topic);

      subtopicSelect.innerHTML = "";
      const optAll = document.createElement("option");
      optAll.value = "all";
      optAll.textContent = "All Subtopics";
      subtopicSelect.appendChild(optAll);

      subs.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s;
        subtopicSelect.appendChild(opt);
      });

      subtopicSelect.value = subs.includes(current) ? current : "all";
    }

    /* ✅ Either/Or filter behavior */
    const DEFAULT_SEARCH_PH = "Search keywords (title / description / subtopic / tags)...";
    function enforceEitherOr(source){
      const hasKeyword = norm(searchInput.value).length > 0;
      const hasTopic = (topicSelect.value && topicSelect.value !== "all");
      const hasSubtopic = (subtopicSelect.value && subtopicSelect.value !== "all");
      const hasDropdownFilter = hasTopic || hasSubtopic;

      if (source === "topic") {
        if (hasDropdownFilter) {
          searchInput.value = "";
          searchInput.disabled = true;
          searchInput.placeholder = "Keyword search disabled while topic/subtopic filter is active";
          topicSelect.disabled = false;
          subtopicSelect.disabled = false;
        } else {
          searchInput.disabled = false;
          searchInput.placeholder = DEFAULT_SEARCH_PH;
        }
      }

      if (source === "keyword") {
        const nowHasKeyword = norm(searchInput.value).length > 0;
        if (nowHasKeyword) {
          topicSelect.value = "all";
          subtopicSelect.value = "all";
          topicSelect.disabled = true;
          subtopicSelect.disabled = true;
          subtopicRow.style.display = "none";
        } else {
          topicSelect.disabled = false;
          subtopicSelect.disabled = false;
        }
      }

      if (!hasKeyword && !hasDropdownFilter) {
        searchInput.disabled = false;
        searchInput.placeholder = DEFAULT_SEARCH_PH;
        topicSelect.disabled = false;
        subtopicSelect.disabled = false;
      }
    }

    function passesFilters(v){
      const q = norm(searchInput.value);
      const topic = topicSelect.value;
      const sub = subtopicSelect.value;

      const matchesTopic = (topic === "all") || ((v.topic || "") === topic);
      const matchesSub   = (sub === "all") || ((v.subtopic || "") === sub);

      const hay = norm(
        (v.title || "") + " " +
        (v.desc || "") + " " +
        (v.topic || "") + " " +
        (v.subtopic || "") + " " +
        ((v.keywords || []).join(" ")) + " " +
        ((v._auto || []).join(" "))
      );
      const matchesText = !q || hay.includes(q);

      return matchesTopic && matchesSub && matchesText;
    }

    function buildList(){
      listEl.innerHTML = "";

      const visibleIdxs = [];
      videos.forEach((v, idx) => {
        if (passesFilters(v)) visibleIdxs.push(idx);

      visibleIdxs.forEach((idx) => {
        const v = videos[idx];

        const card = document.createElement("div");

        badge.className = "badge";

        applyTopicColor(badge, v.topic);

        const thumb = document.createElement("div");
        thumb.className = "thumb";

        const thumbRatio = document.createElement("div");
        thumbRatio.className = "thumbRatio";

        const img = document.createElement("img");
        img.className = "thumbImg";
        img.loading = "lazy";
        img.decoding = "async";
        img.alt = v.title || "Video thumbnail";
        img.src = thumbUrlFor(v);

        const dot = document.createElement("div");
        dot.className = "playDot";
        dot.textContent = "▶";

        thumbRatio.appendChild(img);
        thumbRatio.appendChild(dot);
        thumb.appendChild(thumbRatio);

        const meta = document.createElement("div");
        meta.className = "meta";

        const t = document.createElement("div");
        t.className = "title";
        t.textContent = v.title || "Untitled video";

        const d = document.createElement("div");
        d.className = "sub";
        d.textContent = v.desc || "";

        meta.appendChild(t);
        meta.appendChild(d);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cardBtn";
        btn.setAttribute("aria-label", "Open in featured viewer");
        btn.addEventListener("click", () => pushSwapToFeatured(idx));

        card.appendChild(badge);
        card.appendChild(thumb);
        card.appendChild(meta);
        card.appendChild(btn);

        listEl.appendChild(card);
      });

      syncSidebarHeight();
    }

    searchInput.addEventListener("input", () => {
      enforceEitherOr("keyword");
      buildList();
    });

    topicSelect.addEventListener("change", () => {
      buildSubtopicOptions();
      if (topicSelect.value === "all") {
        subtopicSelect.value = "all";
        subtopicRow.style.display = "none";
      }
      enforceEitherOr("topic");
      buildList();
    });

    subtopicSelect.addEventListener("change", () => {
      enforceEitherOr("topic");
      buildList();
    });

    document.getElementById("resetFilters").addEventListener("click", () => {
      searchInput.value = "";
      searchInput.disabled = false;
      searchInput.placeholder = DEFAULT_SEARCH_PH;

      topicSelect.disabled = false;
      subtopicSelect.disabled = false;

      topicSelect.value = "all";
      subtopicSelect.value = "all";
      subtopicRow.style.display = "none";

      buildTopicOptions();
      buildSubtopicOptions();
      buildList();
    });

    function syncSidebarHeight(){
      if (window.matchMedia("(max-width:900px)").matches) {
        sidebar.style.height = "auto";
        return;
      }
      const h = featuredBox.getBoundingClientRect().height;
      if (h > 0) sidebar.style.height = h + "px";
    }
    window.addEventListener("resize", syncSidebarHeight);

    document.getElementById("scrollUp").addEventListener("click", () => {
      listEl.scrollBy({ top: -260, left: 0, behavior: "smooth" });
    });
    document.getElementById("scrollDown").addEventListener("click", () => {
      listEl.scrollBy({ top: 260, left: 0, behavior: "smooth" });
    });

    /* ✅ Resizable split logic (featured min 50%) */
    const MIN_LEFT_RATIO = 0.50;
    const MAX_LEFT_RATIO = 0.88;

    function setLeftRatio(r){
      const clamped = Math.max(MIN_LEFT_RATIO, Math.min(MAX_LEFT_RATIO, r));
      split.style.setProperty("--left", (clamped * 100).toFixed(2) + "%");
      requestAnimationFrame(syncSidebarHeight);
    }

    function isDesktop(){
      return !window.matchMedia("(max-width:900px)").matches;
    }

    function pointerToRatio(clientX){
      const rect = split.getBoundingClientRect();
      const x = clientX - rect.left;
      return x / rect.width;
    }

    let dragging = false;

    function startDrag(e){
      if (!isDesktop()) return;
      dragging = true;
      document.body.classList.add("dragging");
      divider.setPointerCapture?.(e.pointerId);
    }
    function moveDrag(e){
      if (!dragging || !isDesktop()) return;
      setLeftRatio(pointerToRatio(e.clientX));
    }
    function endDrag(){
      if (!dragging) return;
      dragging = false;
      document.body.classList.remove("dragging");
    }

    divider.addEventListener("pointerdown", startDrag);
    divider.addEventListener("pointermove", moveDrag);
    divider.addEventListener("pointerup", endDrag);
    divider.addEventListener("pointercancel", endDrag);

    divider.addEventListener("keydown", (e) => {
      if (!isDesktop()) return;
      const current = parseFloat(getComputedStyle(split).getPropertyValue("--left")) / 100 || 0.78;
      if (e.key === "ArrowLeft") { e.preventDefault(); setLeftRatio(current - 0.02); }
      if (e.key === "ArrowRight"){ e.preventDefault(); setLeftRatio(current + 0.02); }
      if (e.key === "Home")      { e.preventDefault(); setLeftRatio(MIN_LEFT_RATIO); }
      if (e.key === "End")       { e.preventDefault(); setLeftRatio(MAX_LEFT_RATIO); }
    });

    // ✅ Init
    buildTopicOptions();
    buildSubtopicOptions();
    setFeaturedInstant(0);

    enforceEitherOr("topic");
    buildList();

    requestAnimationFrame(syncSidebarHeight);
    setTimeout(syncSidebarHeight, 200);

    // Debug helper (optional): open DevTools console to confirm count
    // console.log("VIDEOS LOADED:", videos.length);
  </script>
</body>

</html>
